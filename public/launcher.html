<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-grid">
  <h2>🌐 Fast Mail Launcher</h2>
  <div class="grid-row">
    <input id="senderName" placeholder="Sender Name" maxlength="100">
    <input id="email" type="email" placeholder="Your Gmail" maxlength="254">
  </div>
  <div class="grid-row">
    <input id="pass" type="password" placeholder="Gmail App Password" maxlength="200">
    <input id="subject" placeholder="Subject" maxlength="500">
  </div>
  <div class="grid-row">
    <textarea id="message" placeholder="Message Body" maxlength="50000"></textarea>
    <div class="rc-wrap">
      <textarea id="recipients" placeholder="Recipients (comma or newline)&#10;Max 500 emails"></textarea>
      <span id="rcCount" class="rc-count">0 recipients</span>
    </div>
  </div>
  <div class="grid-row">
    <button id="sendBtn">🚀 Send All</button>
    <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
  </div>
  <p id="statusMessage"></p>
</div>
<script src="script.js"></script>
</body>
</html>
