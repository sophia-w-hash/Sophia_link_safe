<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Mail Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-grid">
    <h2>📧 Fast Mail Launcher</h2>

    <div class="limit-bar" id="limitBar">
      📊 Mail Limit: <span id="limitText">-- / 26</span> used
      &nbsp;|&nbsp; ⏱ Reset in: <span id="resetText">--</span> min
    </div>

    <div class="grid-row">
      <input id="senderName" placeholder="Sender Name" />
      <input id="email" type="email" placeholder="Your Gmail" />
    </div>
    <div class="grid-row">
      <input id="pass" type="password" placeholder="Gmail App Password" autocomplete="off" />
      <input id="subject" placeholder="Subject" />
    </div>
    <div class="grid-row">
      <textarea id="message" placeholder="Message Body"></textarea>
      <div style="position:relative;flex:1;display:flex;flex-direction:column;">
        <textarea id="recipients" placeholder="Recipients (comma or newline)&#10;Max 26 emails per hour" style="flex:1;"></textarea>
        <span id="recipientCount" style="font-size:12px;color:#22c55e;text-align:right;margin-top:4px;font-weight:600;">0 recipients</span>
      </div>
    </div>
    <div class="grid-row">
      <button id="sendBtn">🚀 Send All</button>
      <button id="logoutBtn">🟧 Logout</button>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p id="statusMessage"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
