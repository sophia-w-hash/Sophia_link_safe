<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mail App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h2>Transactional Email</h2>

<input id="smtpEmail" placeholder="SMTP Email">

<input id="smtpPassword"
type="password"
placeholder="App Password">

<input id="recipient"
placeholder="Recipient Email">

<input id="subject"
placeholder="Subject">

<textarea id="message"
placeholder="Message"></textarea>

<button onclick="sendMail()">Send</button>

<button onclick="logout()">Logout</button>

<div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
