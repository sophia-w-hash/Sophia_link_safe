<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-grid">

<h2>📧 Fast Mail Launcher</h2>

<div class="grid-row">
<input placeholder="Sender Name">
<input placeholder="Your Gmail">
</div>

<div class="grid-row">
<input type="password"
placeholder="App Password">

<input placeholder="Subject">
</div>

<div class="grid-row">

<textarea
placeholder="Message Body">
</textarea>

<textarea
placeholder="Recipient Email">
</textarea>

</div>

<div class="grid-row">

<button id="sendBtn">
Send Email
</button>

<div>

<button id="logoutBtn">
Logout
</button>

<div class="logout-hint">
Double-click to logout
</div>

</div>

</div>

<p id="statusMessage"></p>

</div>

<script src="script.js"></script>

</body>
</html>
