<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mail Sender</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

<h2>Mail Sender</h2>

<input id="senderName" placeholder="Sender Name">

<input id="gmail" placeholder="Your Gmail">

<input
  id="appPassword"
  type="password"
  placeholder="App Password"
>

<input id="recipient" placeholder="Recipient Email">

<input id="subject" placeholder="Subject">

<textarea
  id="message"
  placeholder="Message"
></textarea>

<button id="sendBtn">
  Send
</button>

<button id="logoutBtn">
  Logout
</button>

<p>Double-click logout</p>

</div>

<script src="script.js"></script>

</body>
</html>
