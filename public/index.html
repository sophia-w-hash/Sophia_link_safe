<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>📧 Mail Launcher</h1>

  <input type="text" placeholder="Sender Name">
  <input type="email" placeholder="Your Gmail">
  <input type="password" placeholder="App Password">
  <input type="text" placeholder="Subject">
  <textarea placeholder="Message Body"></textarea>
  <input type="email" placeholder="Recipient Email">

  <button id="sendBtn">Send Email</button>

  <p id="status"></p>
</div>

<script src="app.js"></script>
</body>
</html>
